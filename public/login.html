<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log in - TicketFlow</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body data-page="">
    <nav class="navbar" id="navbar"></nav>

    <header class="page-hero page-hero-compact">
        <h1>Log in</h1>
        <p>Access your bookings and organizer tools.</p>
    </header>

    <main class="container">
        <div class="form-container">
            <h2 style="text-align: center; margin-bottom: 2rem;">Welcome Back</h2>
            <div id="error-msg" style="color: var(--danger); margin-bottom: 1rem; text-align: center;"></div>
            <form id="login-form">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" required placeholder="Enter your email">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" required placeholder="Enter your password">
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%;">Login</button>
            </form>
            <p style="text-align: center; margin-top: 1rem;">
                Don't have an account? <a href="/register.html" style="color: var(--primary-color);">Sign up</a>
            </p>
        </div>
    </main>

    <footer id="site-footer"></footer>
    <script src="/js/main.js"></script>
    <script src="/js/accessibility.js"></script>
    <script src="/js/pages.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            if (getUser()) {
                const params = new URLSearchParams(window.location.search);
                window.location.href = params.get('redirect') || '/';
            }
        });

        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('error-msg');

            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (response.ok) {
                    localStorage.setItem('user', JSON.stringify(data));
                    const params = new URLSearchParams(window.location.search);
                    window.location.href = params.get('redirect') || '/';
                } else {
                    errorMsg.textContent = data.message || 'Login failed';
                }
            } catch (error) {
                errorMsg.textContent = 'Network error. Please try again later.';
            }
        });
    </script>
</body>
</html>
