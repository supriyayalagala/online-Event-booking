<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign up - TicketFlow</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body data-page="">
    <nav class="navbar" id="navbar"></nav>

    <header class="page-hero page-hero-compact">
        <h1>Sign up</h1>
        <p>Create your free TicketFlow account.</p>
    </header>

    <main class="container">
        <div class="form-container">
            <h2 style="text-align: center; margin-bottom: 2rem;">Create an Account</h2>
            <div id="error-msg" style="color: var(--danger); margin-bottom: 1rem; text-align: center;"></div>
            <form id="register-form">
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" required placeholder="Enter your full name">
                </div>
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" required placeholder="Enter your email">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" required placeholder="Create a password">
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%;">Sign Up</button>
            </form>
            <p style="text-align: center; margin-top: 1rem;">
                Already have an account? <a href="/login.html" style="color: var(--primary-color);">Login</a>
            </p>
        </div>
    </main>

    <footer id="site-footer"></footer>
    <script src="/js/main.js"></script>
    <script src="/js/accessibility.js"></script>
    <script src="/js/pages.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            if (getUser()) {
                window.location.href = '/';
            }
        });

        document.getElementById('register-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('error-msg');

            try {
                const response = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, email, password })
                });

                const data = await response.json();

                if (response.ok) {
                    errorMsg.style.color = 'var(--secondary-color)';
                    errorMsg.textContent = 'Successfully signed up! Please click the Login link below.';
                } else {
                    errorMsg.style.color = 'var(--danger)';
                    errorMsg.textContent = data.message || 'Registration failed';
                }
            } catch (error) {
                errorMsg.style.color = 'var(--danger)';
                errorMsg.textContent = 'Network error. Please try again later.';
            }
        });
    </script>
</body>
</html>
