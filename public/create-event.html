<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Event - TicketFlow</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body data-page="">
    <nav class="navbar" id="navbar"></nav>

    <header class="page-hero">
        <h1>Create Your Event</h1>
        <p>Fill in the details below to publish a new event on TicketFlow.</p>
    </header>

    <main class="container">
        <div id="access-msg"></div>
        <div class="form-container wide" id="create-form-wrap" style="display:none;">
            <h2 style="text-align:center;margin-bottom:1.5rem;">Event Details</h2>
            <div id="form-msg"></div>
            <form id="create-event-form">
                <div class="form-group">
                    <label for="title">Event Title *</label>
                    <input type="text" id="title" required placeholder="e.g. Summer Music Festival">
                </div>
                <div class="form-group">
                    <label for="description">Description *</label>
                    <textarea id="description" rows="4" required placeholder="Describe your event..."></textarea>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="category">Category *</label>
                        <select id="category" required>
                            <option value="">Select category</option>
                            <option value="Wedding">Wedding</option>
                            <option value="Birthday">Birthday</option>
                            <option value="Corporate">Corporate</option>
                            <option value="Mature/Family Function">Mature/Family Function</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="price">Price per Person (₹) *</label>
                        <input type="number" id="price" min="0" step="0.01" required>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="date">Event Date *</label>
                        <input type="date" id="date" required>
                    </div>
                    <div class="form-group">
                        <label for="time">Event Time *</label>
                        <input type="time" id="time" required>
                    </div>
                </div>
                <div class="form-group">
                    <label for="location">Location *</label>
                    <input type="text" id="location" required placeholder="Venue name and city">
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="capacity">Total Capacity *</label>
                        <input type="number" id="capacity" min="1" required>
                    </div>
                    <div class="form-group">
                        <label for="imageUrl">Cover Image URL *</label>
                        <input type="url" id="imageUrl" required placeholder="https://...">
                    </div>
                </div>
                <button type="submit" class="btn btn-primary btn-lg" style="width:100%;">Publish Event</button>
            </form>
        </div>
    </main>

    <footer id="site-footer"></footer>

    <script src="/js/main.js"></script>
    <script src="/js/event-images.js"></script>
    <script src="/js/accessibility.js"></script>
    <script src="/js/pages.js"></script>
    <script>
        function applySuggestedCoverImage() {
            const cat = document.getElementById('category')?.value;
            const title = document.getElementById('title')?.value || '';
            const imageInput = document.getElementById('imageUrl');
            if (!cat || !imageInput || typeof suggestEventImage !== 'function') return;
            imageInput.value = suggestEventImage(cat, title);
        }

        document.addEventListener('DOMContentLoaded', () => {
            const accessMsg = document.getElementById('access-msg');
            const formWrap = document.getElementById('create-form-wrap');

            if (!getToken()) {
                accessMsg.innerHTML = `
                    <div class="alert alert-info" style="max-width:560px;margin:2rem auto;">
                        Please <a href="/login.html?redirect=/create-event.html" style="color:var(--primary-color);font-weight:600;">log in</a> as an admin to create events.
                        New organizer? <a href="/book-demo.html" style="color:var(--primary-color);">Book a demo</a> to get started.
                    </div>`;
                return;
            }

            const user = getUser();
            if (user.role !== 'admin') {
                accessMsg.innerHTML = `
                    <div class="alert alert-info" style="max-width:560px;margin:2rem auto;">
                        Only organizers with admin access can create events.
                        <a href="/book-demo.html" class="btn btn-primary" style="display:inline-block;margin-top:1rem;">Book a Demo</a>
                        <a href="/events.html" class="btn btn-outline" style="display:inline-block;margin-top:1rem;margin-left:0.5rem;">Browse Events</a>
                    </div>`;
                return;
            }

            formWrap.style.display = 'block';

            document.getElementById('category')?.addEventListener('change', applySuggestedCoverImage);
            document.getElementById('title')?.addEventListener('blur', applySuggestedCoverImage);
            applySuggestedCoverImage();
        });

        document.getElementById('create-event-form')?.addEventListener('submit', async (e) => {
            e.preventDefault();
            const msg = document.getElementById('form-msg');
            const token = getToken();

            const payload = {
                title: document.getElementById('title').value,
                description: document.getElementById('description').value,
                category: document.getElementById('category').value,
                price: Number(document.getElementById('price').value),
                date: document.getElementById('date').value,
                time: document.getElementById('time').value,
                location: document.getElementById('location').value,
                capacity: Number(document.getElementById('capacity').value),
                availableSeats: Number(document.getElementById('capacity').value),
                imageUrl: document.getElementById('imageUrl').value
            };

            try {
                const res = await fetch('/api/events', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        Authorization: `Bearer ${token}`
                    },
                    body: JSON.stringify(payload)
                });
                const data = await res.json();

                if (res.ok) {
                    msg.innerHTML = '<div class="alert alert-success">Event created! Redirecting...</div>';
                    setTimeout(() => window.location.href = `/event-details.html?id=${data._id}`, 1500);
                } else {
                    msg.innerHTML = `<div class="alert alert-error">${data.message || 'Failed to create event'}</div>`;
                }
            } catch (err) {
                msg.innerHTML = '<div class="alert alert-error">Network error. Please try again.</div>';
            }
        });
    </script>
</body>
</html>
